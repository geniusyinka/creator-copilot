steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/creator-copilot-server:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/creator-copilot-server:latest'
      - './server'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/creator-copilot-server:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/creator-copilot-server:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'creator-copilot-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/creator-copilot-server:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600s'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/creator-copilot-server:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/creator-copilot-server:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
